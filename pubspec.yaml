name: check_in_reminder
description: "Check-in Reminder - Smart geofence-based attendance reminder app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  # Routing
  go_router: ^17.0.0
  # Local storage
  hive_ce: ^2.0.0
  hive_ce_flutter: ^2.0.0
  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  # Local notifications
  flutter_local_notifications: ^21.0.0
  # Permission handling
  permission_handler: ^12.0.0
  # Geofencing (background)
  flutter_background_geolocation: ^5.0.0
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.0
  url_launcher: ^6.3.1
  # Maps
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  # Wi-Fi info
  network_info_plus: ^6.1.0
  # Home widget
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.11.0
  riverpod_generator: ^3.0.0
  hive_ce_generator: ^1.9.0

flutter:
  generate: true
  uses-material-design: true
